apiVersion: batch/v1
kind: CronJob
metadata:
  name: jobs
  namespace: postgres
spec:
  schedule: "*/2 * * * *"
  jobTemplate:
     spec:
        completions: 3
        parallelism: 3
        activeDeadlineSeconds: 100
        template:
          spec:
           containers:
           - name: cicd
             image: cezeike39/docker:cicd
           restartPolicy: Never
